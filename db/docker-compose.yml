version: '3.8'

services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb_envases
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: envases_inventory
      MYSQL_USER: test_user
      MYSQL_PASSWORD: pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always

volumes:
  mariadb_data: